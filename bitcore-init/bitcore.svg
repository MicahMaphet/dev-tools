<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2240C4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A3B8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C204E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Pill shape with gradient fill -->
  <rect x="0" y="42%" width="100%" height="45%" rx="30" ry="30" fill="url(#pillGrad)" />

  <!-- BitPay wordmark in white -->
  <text
    x="50%"
    y="73%"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-0.5"
  >bitcore</text>
</svg>